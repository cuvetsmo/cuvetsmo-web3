<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ai by CUVETSMO icon">
  <title>ai by CUVETSMO favicon</title>
  <!-- Favicon: paired citation brackets framing implied content -->
  <!-- Uses both brackets (not just one) so the mark reads as a frame/citation, not a parenthesis -->
  <rect width="32" height="32" rx="6" fill="#FAFAF9"/>
  <g fill="none" stroke="#D97706" stroke-width="2.6" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Left bracket -->
    <path d="M 11 8 L 7 8 L 7 24 L 11 24" />
    <!-- Right bracket -->
    <path d="M 21 8 L 25 8 L 25 24 L 21 24" />
  </g>
  <!-- Center dot anchors the frame and reads as a citation marker at 16px -->
  <circle cx="16" cy="16" r="1.8" fill="#1C1917"/>
</svg>
